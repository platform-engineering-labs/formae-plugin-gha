name: Nightly

# Tests the plugin against formae main (or a dispatched branch) to catch SDK
# regressions before release.

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC
  workflow_dispatch:
    inputs:
      formae_branch:
        description: "Formae branch/tag to build from (default: main)"
        required: false
        default: "main"
        type: string

env:
  GHA_TEST_OWNER: platform-engineering-labs
  GHA_TEST_REPO: formae-plugin-gha-test

jobs:
  # Build formae from the specified branch and the plugin; share via artifact.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Build formae
        run: |
          BRANCH="${{ inputs.formae_branch || 'main' }}"
          echo "Building formae from branch: ${BRANCH}"
          git clone --branch "${BRANCH}" --depth 1 https://github.com/platform-engineering-labs/formae.git /tmp/formae
          cd /tmp/formae
          git fetch --tags --unshallow
          make build
          cp /tmp/formae/formae /tmp/formae-binary

      - name: Build and install plugin
        run: make install

      - name: Upload formae binary
        uses: actions/upload-artifact@v7
        with:
          name: formae-binary
          path: /tmp/formae-binary
          retention-days: 1

      - name: Upload installed plugin
        uses: actions/upload-artifact@v7
        with:
          name: plugin-installed
          path: ~/.pel/formae/plugins/
          retention-days: 1

  conformance-tests-main:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Download formae binary
        uses: actions/download-artifact@v8
        with:
          name: formae-binary
          path: /tmp

      - name: Download installed plugin
        uses: actions/download-artifact@v8
        with:
          name: plugin-installed
          path: ~/.pel/formae/plugins/

      - name: Prepare binaries
        run: |
          chmod +x /tmp/formae-binary
          chmod +x ~/.pel/formae/plugins/gha/*/gha
          echo "FORMAE_BINARY=/tmp/formae-binary" >> $GITHUB_ENV

      - name: Run conformance tests
        env:
          GITHUB_TOKEN: ${{ secrets.GHA_TEST_TOKEN }}
          FORMAE_TEST_RUN_ID: nightly-${{ github.run_id }}-${{ github.run_attempt }}
          FORMAE_TEST_TIMEOUT: "10"
        run: make conformance-test

  # Clean up test resources regardless of conformance outcome.
  cleanup:
    needs: [conformance-tests-main]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6

      - name: Clean up test resources
        env:
          GITHUB_TOKEN: ${{ secrets.GHA_TEST_TOKEN }}
        run: ./scripts/ci/clean-environment.sh
